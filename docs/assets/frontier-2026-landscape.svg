<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #fffdfa; }
      .title { font: 700 34px Helvetica, Arial, sans-serif; fill: #111827; }
      .body { font: 500 18px Helvetica, Arial, sans-serif; fill: #374151; }
      .card-title { font: 700 22px Helvetica, Arial, sans-serif; fill: #111827; }
      .card-body { font: 500 17px Helvetica, Arial, sans-serif; fill: #374151; }
      .small { font: 500 15px Helvetica, Arial, sans-serif; fill: #4b5563; }
      .card-a { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .card-b { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .card-c { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .card-d { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" rx="24" />
  <text class="title" x="60" y="70">Verified frontier snapshot for Wi-Fi sensing (as of May 2026)</text>
  <text class="body" x="60" y="105">These are the developments worth knowing cold if you want to talk about where this repo sits relative to the field.</text>

  <rect class="card-a" x="70" y="160" width="285" height="255" rx="20" />
  <text class="card-title" x="95" y="205">1. 802.11bf-2025</text>
  <text class="card-body" x="95" y="242">Published 2025-09-26</text>
  <text class="card-body" x="95" y="272">Standardized WLAN sensing</text>
  <text class="card-body" x="95" y="302">MAC + PHY enhancements</text>
  <text class="card-body" x="95" y="332">1-7.125 GHz and &gt;45 GHz</text>
  <text class="small" x="95" y="372">Meaning for this repo:</text>
  <text class="small" x="95" y="395">the future sensing target is real,</text>
  <text class="small" x="95" y="417">but this prototype is not a native</text>
  <text class="small" x="95" y="439">802.11bf implementation yet.</text>

  <rect class="card-b" x="390" y="160" width="285" height="255" rx="20" />
  <text class="card-title" x="415" y="205">2. CSI-Bench</text>
  <text class="card-body" x="415" y="242">26 environments</text>
  <text class="card-body" x="415" y="272">35 users</text>
  <text class="card-body" x="415" y="302">461+ hours effective data</text>
  <text class="card-body" x="415" y="332">16 device types</text>
  <text class="small" x="415" y="372">Meaning for this repo:</text>
  <text class="small" x="415" y="395">evaluation has to move beyond</text>
  <text class="small" x="415" y="417">synthetic demos and single-room</text>
  <text class="small" x="415" y="439">assumptions.</text>

  <rect class="card-c" x="710" y="160" width="285" height="255" rx="20" />
  <text class="card-title" x="735" y="205">3. AM-FM</text>
  <text class="card-body" x="735" y="242">9.2M unlabeled CSI samples</text>
  <text class="card-body" x="735" y="272">439 days of collection</text>
  <text class="card-body" x="735" y="302">20 commercial device types</text>
  <text class="card-body" x="735" y="332">9 downstream tasks</text>
  <text class="small" x="735" y="372">Meaning for this repo:</text>
  <text class="small" x="735" y="395">pretraining is no longer the only</text>
  <text class="small" x="735" y="417">story; fine-tune and adapt is now</text>
  <text class="small" x="735" y="439">a believable path.</text>

  <rect class="card-d" x="1030" y="160" width="285" height="255" rx="20" />
  <text class="card-title" x="1055" y="205">4. Tiny-WiFo</text>
  <text class="card-body" x="1055" y="242">5.5M parameters</text>
  <text class="card-body" x="1055" y="272">1.6 ms inference</text>
  <text class="card-body" x="1055" y="302">&gt;98% of teacher performance</text>
  <text class="card-body" x="1055" y="332">zero-shot retained in paper claim</text>
  <text class="small" x="1055" y="372">Meaning for this repo:</text>
  <text class="small" x="1055" y="395">edge deployment is becoming</text>
  <text class="small" x="1055" y="417">realistic if the live-data pipeline</text>
  <text class="small" x="1055" y="439">is trustworthy first.</text>

  <rect class="note" x="70" y="500" width="1245" height="160" rx="20" />
  <text class="card-title" x="100" y="545">What still is NOT solved by the frontier</text>
  <text class="card-body" x="100" y="585">- Cross-room and cross-device generalization is still the hardest real deployment problem.</text>
  <text class="card-body" x="100" y="615">- Packet irregularity, mixed subcarrier widths, and phase instability still punish naive pipelines.</text>
  <text class="card-body" x="100" y="645">- A paper result does not magically remove the need for good capture contracts, timestamp handling, and honest validation.</text>

  <rect class="note" x="70" y="710" width="1245" height="120" rx="20" />
  <text class="card-title" x="100" y="755">Bottom line for this repository</text>
  <text class="card-body" x="100" y="792">This repo is valuable precisely because it starts with the boring but essential parts: reliable capture, parsing, windowing, baseline DSP, and explicit limitations. The frontier only helps if those fundamentals are solid.</text>
</svg>
