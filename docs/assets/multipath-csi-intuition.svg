<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .title { font: 700 34px Helvetica, Arial, sans-serif; fill: #111827; }
      .body { font: 500 18px Helvetica, Arial, sans-serif; fill: #374151; }
      .label { font: 700 20px Helvetica, Arial, sans-serif; fill: #111827; }
      .small { font: 500 16px Helvetica, Arial, sans-serif; fill: #4b5563; }
      .wall { stroke: #cbd5e1; stroke-width: 10; }
      .direct { stroke: #2563eb; stroke-width: 5; fill: none; }
      .reflect-a { stroke: #f59e0b; stroke-width: 4; fill: none; stroke-dasharray: 12 8; }
      .reflect-b { stroke: #10b981; stroke-width: 4; fill: none; stroke-dasharray: 12 8; }
      .reflect-c { stroke: #ef4444; stroke-width: 4; fill: none; stroke-dasharray: 12 8; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .chip { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .person { fill: #fde68a; stroke: #d97706; stroke-width: 2; }
    </style>
    <marker id="arrow-multi" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860" rx="24" />
  <text class="title" x="60" y="70">Why one Wi-Fi packet turns into many physical paths</text>
  <text class="body" x="60" y="105">CSI is useful because the receiver does not see one clean path. It sees the channel-summed result of many paths.</text>

  <line class="wall" x1="100" y1="180" x2="1300" y2="180" />
  <line class="wall" x1="100" y1="690" x2="1300" y2="690" />

  <rect class="chip" x="120" y="360" width="190" height="110" rx="18" />
  <text class="label" x="160" y="410">Wi-Fi source</text>
  <text class="small" x="150" y="438">AP or emitter</text>
  <path d="M300 392 q25 -22 50 0" fill="none" stroke="#2563eb" stroke-width="3" />
  <path d="M300 438 q25 22 50 0" fill="none" stroke="#2563eb" stroke-width="3" />

  <rect class="chip" x="1090" y="360" width="200" height="110" rx="18" />
  <text class="label" x="1132" y="410">ESP32 RX</text>
  <text class="small" x="1120" y="438">CSI callback here</text>

  <circle class="person" cx="700" cy="470" r="38" />
  <rect class="person" x="670" y="510" width="60" height="110" rx="18" />
  <line x1="670" y1="620" x2="640" y2="675" stroke="#d97706" stroke-width="8" />
  <line x1="730" y1="620" x2="760" y2="675" stroke="#d97706" stroke-width="8" />
  <line x1="670" y1="535" x2="620" y2="585" stroke="#d97706" stroke-width="8" />
  <line x1="730" y1="535" x2="780" y2="585" stroke="#d97706" stroke-width="8" />
  <text class="small" x="640" y="730">Human body changes reflection paths and phase relationships</text>

  <path class="direct" d="M310 415 C520 405, 880 405, 1090 415" marker-end="url(#arrow-multi)" />
  <path class="reflect-a" d="M310 395 C520 190, 880 190, 1090 395" marker-end="url(#arrow-multi)" />
  <path class="reflect-b" d="M310 445 C520 680, 880 680, 1090 445" marker-end="url(#arrow-multi)" />
  <path class="reflect-c" d="M310 425 C520 460, 600 470, 640 500 C760 560, 920 500, 1090 425" marker-end="url(#arrow-multi)" />

  <rect class="box" x="90" y="760" width="1220" height="70" rx="18" />
  <text class="body" x="120" y="802">Direct path + wall reflections + floor reflections + body interactions all add together at the receiver. CSI preserves this structure per subcarrier; RSSI mostly collapses it into one number.</text>

  <rect class="box" x="970" y="120" width="290" height="170" rx="18" />
  <text class="label" x="1000" y="165">Per-subcarrier view</text>
  <rect x="1005" y="190" width="24" height="50" fill="#2563eb" />
  <rect x="1040" y="205" width="24" height="35" fill="#0ea5e9" />
  <rect x="1075" y="178" width="24" height="62" fill="#10b981" />
  <rect x="1110" y="214" width="24" height="26" fill="#f59e0b" />
  <rect x="1145" y="195" width="24" height="45" fill="#ef4444" />
  <rect x="1180" y="170" width="24" height="70" fill="#8b5cf6" />
  <text class="small" x="1005" y="270">Different subcarriers react differently</text>
  <text class="small" x="1005" y="292">to the same room and the same person.</text>
</svg>
